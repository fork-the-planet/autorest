# Template for building projects
steps:
  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"
    displayName: "Install Node.js"

  - script: corepack enable
    displayName: "Enable corepack"

  - script: pnpm install --frozen-lockfile
    displayName: "Install dependencies"

  - script: pnpm run build
    displayName: "Build"
